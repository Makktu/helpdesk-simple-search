<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helpdesk Search</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <div class="search-header">
        <h1 class="app-title">Helpdesk Room Search</h1>

        <div class="search-bar-container">
          <div class="search-bar-inner">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              type="text"
              id="locationSearch"
              class="search-input"
              placeholder="Search rooms, departments, buildings..."
              autocomplete="off"
              spellcheck="false"
            />
            <button class="clear-btn" id="clearBtn" aria-label="Clear search" style="display: none">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="filter-buttons">
          <button class="filter-btn active" data-site="">All Locations</button>
          <button class="filter-btn" data-site="Walsgrave">Walsgrave</button>
          <button class="filter-btn" data-site="St. Cross">St Cross</button>
        </div>

        <div class="status-text" id="statusText"></div>
      </div>

      <main class="results-area" id="searchResults" style="display: none">
        <div id="resultsContainer"></div>
        <div id="noResults" class="no-results" style="display: none">
          <p>No results found.</p>
        </div>
      </main>
    </div>

    <canvas id="rainCanvas"></canvas>

    <script src="script.js"></script>
    <script src="rainAnimation.js"></script>
  </body>
</html>
